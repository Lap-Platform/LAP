openapi: "3.0.0"
info:
  title: Array Nested API
  version: "1.0.0"
servers:
  - url: https://api.arraynested.com
paths:
  /orders:
    get:
      summary: List orders with nested items
      responses:
        "200":
          description: Order list
          content:
            application/json:
              schema:
                type: object
                properties:
                  orders:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        items:
                          type: array
                          items:
                            type: object
                            properties:
                              sku:
                                type: string
                              qty:
                                type: integer
                  total:
                    type: integer
