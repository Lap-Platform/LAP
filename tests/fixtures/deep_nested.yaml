openapi: "3.0.0"
info:
  title: Deep Nested API
  version: "1.0.0"
servers:
  - url: https://api.deep.com
paths:
  /deep:
    get:
      summary: Get deeply nested object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  level1:
                    type: object
                    properties:
                      level2:
                        type: object
                        properties:
                          level3:
                            type: object
                            properties:
                              value:
                                type: string
                          name:
                            type: string
                      id:
                        type: integer
                  top_field:
                    type: string
