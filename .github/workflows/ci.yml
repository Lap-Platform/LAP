name: CI — Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    name: Python Tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-timeout graphql-core tiktoken pyyaml

      - name: Run test suite
        run: |
          python -m pytest tests/ -q --timeout=60 --ignore=tests/test_integration.py
        timeout-minutes: 10

      - name: Run integration tests (allow failure)
        continue-on-error: true
        run: |
          python -m pytest tests/test_integration.py -q --timeout=120
        timeout-minutes: 5

  typescript-tests:
    name: TypeScript SDK Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["18", "20"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        working-directory: sdks/typescript
        run: npm ci

      - name: Run test suite
        working-directory: sdks/typescript
        run: npm test
        timeout-minutes: 10
