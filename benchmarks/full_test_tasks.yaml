# Full Multi-Protocol Agent Benchmark Tasks
# 10 tasks per doc, covering 5 protocol types

protocols:
  openapi:
    docs:
      - spec: examples/stripe-charges.yaml
        api: Stripe Charges
        tasks:
          - task: "Create a charge for $50.00 USD with token tok_visa"
            expect_endpoint: "POST /v1/charges"
            expect_params: ["amount", "currency", "source"]
          - task: "Create a charge for €25.50 EUR with customer cus_abc123 and description 'Monthly subscription'"
            expect_endpoint: "POST /v1/charges"
            expect_params: ["amount", "currency", "customer", "description"]
          - task: "Retrieve charge details for ch_abc123xyz"
            expect_endpoint: "GET /v1/charges/{charge}"
            expect_params: ["charge"]
          - task: "List all charges with limit of 10"
            expect_endpoint: "GET /v1/charges"
            expect_params: ["limit"]
          - task: "List charges created after timestamp 1609459200 for customer cus_xyz789"
            expect_endpoint: "GET /v1/charges"
            expect_params: ["created", "customer"]
          - task: "Update charge ch_abc123xyz with description 'Updated charge' and metadata order_id=ORD-999"
            expect_endpoint: "POST /v1/charges/{charge}"
            expect_params: ["charge", "description", "metadata"]
          - task: "Capture charge ch_abc123xyz for full amount with receipt email customer@example.com"
            expect_endpoint: "POST /v1/charges/{charge}/capture"
            expect_params: ["charge", "receipt_email"]
          - task: "List charges for customer cus_abc123 with starting_after cursor ch_prev123"
            expect_endpoint: "GET /v1/charges"
            expect_params: ["customer", "starting_after"]
          - task: "Create a charge with amount 1000 cents in USD, capture false, and statement_descriptor 'MYCOMPANY'"
            expect_endpoint: "POST /v1/charges"
            expect_params: ["amount", "currency", "capture", "statement_descriptor"]
          - task: "Update charge ch_xyz789 with shipping address name 'John Doe' and fraud_details report 'safe'"
            expect_endpoint: "POST /v1/charges/{charge}"
            expect_params: ["charge", "shipping", "fraud_details"]

      - spec: examples/github-core.yaml
        api: GitHub Core
        tasks:
          - task: "List issues for repository octocat/Hello-World"
            expect_endpoint: "GET /repos/{owner}/{repo}/issues"
            expect_params: ["owner", "repo"]
          - task: "Create issue 'Bug: Login fails' in repo octocat/Hello-World with body 'Steps to reproduce...'"
            expect_endpoint: "POST /repos/{owner}/{repo}/issues"
            expect_params: ["owner", "repo", "title", "body"]
          - task: "List open issues for octocat/Hello-World with label 'bug' sorted by created date"
            expect_endpoint: "GET /repos/{owner}/{repo}/issues"
            expect_params: ["owner", "repo", "labels", "state", "sort"]
          - task: "List issues with state 'closed' and per_page 25 for octocat/Hello-World"
            expect_endpoint: "GET /repos/{owner}/{repo}/issues"
            expect_params: ["owner", "repo", "state", "per_page"]
          - task: "Get repository details for octocat/Hello-World"
            expect_endpoint: "GET /repos/{owner}/{repo}"
            expect_params: ["owner", "repo"]
          - task: "Create issue in octocat/Hello-World with title 'Feature request' assigned to user1 and user2"
            expect_endpoint: "POST /repos/{owner}/{repo}/issues"
            expect_params: ["owner", "repo", "title", "assignees"]
          - task: "List pull requests for octocat/Hello-World with state 'open' sorted by updated"
            expect_endpoint: "GET /repos/{owner}/{repo}/pulls"
            expect_params: ["owner", "repo", "state", "sort"]
          - task: "Create pull request in octocat/Hello-World from feature-branch to main with title 'Add new feature'"
            expect_endpoint: "POST /repos/{owner}/{repo}/pulls"
            expect_params: ["owner", "repo", "title", "head", "base"]
          - task: "Merge pull request #42 in octocat/Hello-World with squash merge method"
            expect_endpoint: "PUT /repos/{owner}/{repo}/pulls/{pull_number}/merge"
            expect_params: ["owner", "repo", "pull_number", "merge_method"]
          - task: "List pull requests with base branch 'develop' and direction descending"
            expect_endpoint: "GET /repos/{owner}/{repo}/pulls"
            expect_params: ["owner", "repo", "base", "direction"]

      - spec: examples/openai-core.yaml
        api: OpenAI Core
        tasks:
          - task: "Create chat completion with gpt-4 and message 'Explain quantum computing'"
            expect_endpoint: "POST /v1/chat/completions"
            expect_params: ["model", "messages"]
          - task: "Create chat completion with gpt-3.5-turbo, temperature 0.7, and message 'Write a poem'"
            expect_endpoint: "POST /v1/chat/completions"
            expect_params: ["model", "messages", "temperature"]
          - task: "List all available models"
            expect_endpoint: "GET /v1/models"
            expect_params: []
          - task: "Get details for model gpt-4"
            expect_endpoint: "GET /v1/models/{model}"
            expect_params: ["model"]
          - task: "Create embedding for text 'Hello world' using text-embedding-ada-002"
            expect_endpoint: "POST /v1/embeddings"
            expect_params: ["model", "input"]
          - task: "Create embeddings for list of texts ['cat', 'dog', 'bird'] using ada-002"
            expect_endpoint: "POST /v1/embeddings"
            expect_params: ["model", "input"]
          - task: "Create completion with gpt-3.5-turbo-instruct for prompt 'Once upon a time'"
            expect_endpoint: "POST /v1/completions"
            expect_params: ["model", "prompt"]
          - task: "Create chat completion with system message 'You are helpful' and user message 'Hello'"
            expect_endpoint: "POST /v1/chat/completions"
            expect_params: ["model", "messages"]
          - task: "Create chat completion with max_tokens 100 and stop sequence '\\n\\n'"
            expect_endpoint: "POST /v1/chat/completions"
            expect_params: ["model", "messages", "max_tokens", "stop"]
          - task: "Create streaming chat completion with stream=true"
            expect_endpoint: "POST /v1/chat/completions"
            expect_params: ["model", "messages", "stream"]

      - spec: examples/twilio-core.yaml
        api: Twilio Core
        tasks:
          - task: "Send SMS from +15551234567 to +15559876543 with body 'Hello from Twilio'"
            expect_endpoint: "POST /2010-04-01/Accounts/{AccountSid}/Messages.json"
            expect_params: ["To", "From", "Body"]
          - task: "Send MMS with image URL http://example.com/image.jpg from +15551234567 to +15559876543"
            expect_endpoint: "POST /2010-04-01/Accounts/{AccountSid}/Messages.json"
            expect_params: ["To", "From", "MediaUrl"]
          - task: "List all messages for account"
            expect_endpoint: "GET /2010-04-01/Accounts/{AccountSid}/Messages.json"
            expect_params: []
          - task: "Get message details for message SM123abc456def"
            expect_endpoint: "GET /2010-04-01/Accounts/{AccountSid}/Messages/{MessageSid}.json"
            expect_params: ["MessageSid"]
          - task: "Make voice call from +15551234567 to +15559876543 with TwiML URL http://example.com/twiml.xml"
            expect_endpoint: "POST /2010-04-01/Accounts/{AccountSid}/Calls.json"
            expect_params: ["To", "From", "Url"]
          - task: "List all calls with status 'completed'"
            expect_endpoint: "GET /2010-04-01/Accounts/{AccountSid}/Calls.json"
            expect_params: []
          - task: "Get call details for call CA123abc456def"
            expect_endpoint: "GET /2010-04-01/Accounts/{AccountSid}/Calls/{CallSid}.json"
            expect_params: ["CallSid"]
          - task: "Update call CA123abc456def with status 'completed'"
            expect_endpoint: "POST /2010-04-01/Accounts/{AccountSid}/Calls/{CallSid}.json"
            expect_params: ["CallSid", "Status"]
          - task: "Send SMS with status callback URL http://example.com/callback"
            expect_endpoint: "POST /2010-04-01/Accounts/{AccountSid}/Messages.json"
            expect_params: ["To", "From", "Body", "StatusCallback"]
          - task: "List messages sent to +15559876543"
            expect_endpoint: "GET /2010-04-01/Accounts/{AccountSid}/Messages.json"
            expect_params: ["To"]

      - spec: examples/slack.yaml
        api: Slack
        tasks:
          - task: "Post message 'Hello team!' to channel #general"
            expect_endpoint: "POST /chat.postMessage"
            expect_params: ["channel", "text"]
          - task: "Update message with timestamp 1234567890.123456 in channel C123ABC to 'Updated message'"
            expect_endpoint: "POST /chat.update"
            expect_params: ["channel", "ts", "text"]
          - task: "Delete message with timestamp 1234567890.123456 from channel C123ABC"
            expect_endpoint: "POST /chat.delete"
            expect_params: ["channel", "ts"]
          - task: "List channels with limit 10"
            expect_endpoint: "GET /conversations.list"
            expect_params: ["limit"]
          - task: "Get channel info for channel C123ABC"
            expect_endpoint: "GET /conversations.info"
            expect_params: ["channel"]
          - task: "Post ephemeral message to user U123ABC in channel C123ABC"
            expect_endpoint: "POST /chat.postEphemeral"
            expect_params: ["channel", "user", "text"]
          - task: "Add reaction 'thumbsup' to message 1234567890.123456 in channel C123ABC"
            expect_endpoint: "POST /reactions.add"
            expect_params: ["channel", "timestamp", "name"]
          - task: "Get user info for user U123ABC"
            expect_endpoint: "GET /users.info"
            expect_params: ["user"]
          - task: "List users with limit 20"
            expect_endpoint: "GET /users.list"
            expect_params: ["limit"]
          - task: "Upload file 'report.pdf' to channel C123ABC"
            expect_endpoint: "POST /files.upload"
            expect_params: ["channels", "file"]

      - spec: examples/discord.yaml
        api: Discord
        tasks:
          - task: "Send message 'Hello Discord!' to channel 123456789012345678"
            expect_endpoint: "POST /channels/{channel_id}/messages"
            expect_params: ["channel_id", "content"]
          - task: "Get message 987654321098765432 from channel 123456789012345678"
            expect_endpoint: "GET /channels/{channel_id}/messages/{message_id}"
            expect_params: ["channel_id", "message_id"]
          - task: "Delete message 987654321098765432 from channel 123456789012345678"
            expect_endpoint: "DELETE /channels/{channel_id}/messages/{message_id}"
            expect_params: ["channel_id", "message_id"]
          - task: "Edit message 987654321098765432 in channel 123456789012345678 to 'Updated content'"
            expect_endpoint: "PATCH /channels/{channel_id}/messages/{message_id}"
            expect_params: ["channel_id", "message_id", "content"]
          - task: "Get channel details for channel 123456789012345678"
            expect_endpoint: "GET /channels/{channel_id}"
            expect_params: ["channel_id"]
          - task: "List 50 messages from channel 123456789012345678"
            expect_endpoint: "GET /channels/{channel_id}/messages"
            expect_params: ["channel_id", "limit"]
          - task: "Create reaction '👍' on message 987654321098765432 in channel 123456789012345678"
            expect_endpoint: "PUT /channels/{channel_id}/messages/{message_id}/reactions/{emoji}/@me"
            expect_params: ["channel_id", "message_id", "emoji"]
          - task: "Pin message 987654321098765432 in channel 123456789012345678"
            expect_endpoint: "PUT /channels/{channel_id}/pins/{message_id}"
            expect_params: ["channel_id", "message_id"]
          - task: "Get guild details for guild 123456789012345678"
            expect_endpoint: "GET /guilds/{guild_id}"
            expect_params: ["guild_id"]
          - task: "Send embed message with title 'Alert' and description 'System update' to channel 123456789012345678"
            expect_endpoint: "POST /channels/{channel_id}/messages"
            expect_params: ["channel_id", "embeds"]

      - spec: examples/spotify.yaml
        api: Spotify
        tasks:
          - task: "Search for tracks matching 'Bohemian Rhapsody'"
            expect_endpoint: "GET /v1/search"
            expect_params: ["q", "type"]
          - task: "Get track details for track ID 3n3Ppam7vgaVa1iaRUc9Lp"
            expect_endpoint: "GET /v1/tracks/{id}"
            expect_params: ["id"]
          - task: "Get album details for album ID 4aawyAB9vmqN3uQ7FjRGTy"
            expect_endpoint: "GET /v1/albums/{id}"
            expect_params: ["id"]
          - task: "Get artist details for artist ID 1dfeR4HaWDbWqFHLkxsg1d"
            expect_endpoint: "GET /v1/artists/{id}"
            expect_params: ["id"]
          - task: "Get user's saved tracks with limit 20"
            expect_endpoint: "GET /v1/me/tracks"
            expect_params: ["limit"]
          - task: "Get user's playlists with limit 10"
            expect_endpoint: "GET /v1/me/playlists"
            expect_params: ["limit"]
          - task: "Get playlist details for playlist ID 37i9dQZF1DXcBWIGoYBM5M"
            expect_endpoint: "GET /v1/playlists/{playlist_id}"
            expect_params: ["playlist_id"]
          - task: "Search for artists matching 'Queen' with limit 5"
            expect_endpoint: "GET /v1/search"
            expect_params: ["q", "type", "limit"]
          - task: "Get currently playing track for user"
            expect_endpoint: "GET /v1/me/player/currently-playing"
            expect_params: []
          - task: "Get user profile"
            expect_endpoint: "GET /v1/me"
            expect_params: []

      - spec: examples/cloudflare.yaml
        api: Cloudflare DNS
        tasks:
          - task: "List DNS records for zone abc123"
            expect_endpoint: "GET /zones/{zone_id}/dns_records"
            expect_params: ["zone_id"]
          - task: "Create A record for subdomain.example.com pointing to 192.0.2.1"
            expect_endpoint: "POST /zones/{zone_id}/dns_records"
            expect_params: ["zone_id", "type", "name", "content"]
          - task: "Get DNS record details for record xyz789 in zone abc123"
            expect_endpoint: "GET /zones/{zone_id}/dns_records/{id}"
            expect_params: ["zone_id", "id"]
          - task: "Update DNS record xyz789 in zone abc123 to point to 192.0.2.2"
            expect_endpoint: "PUT /zones/{zone_id}/dns_records/{id}"
            expect_params: ["zone_id", "id", "content"]
          - task: "Delete DNS record xyz789 from zone abc123"
            expect_endpoint: "DELETE /zones/{zone_id}/dns_records/{id}"
            expect_params: ["zone_id", "id"]
          - task: "List zones with status active"
            expect_endpoint: "GET /zones"
            expect_params: ["status"]
          - task: "Get zone details for zone abc123"
            expect_endpoint: "GET /zones/{zone_id}"
            expect_params: ["zone_id"]
          - task: "Create CNAME record for www.example.com pointing to example.com"
            expect_endpoint: "POST /zones/{zone_id}/dns_records"
            expect_params: ["zone_id", "type", "name", "content"]
          - task: "List DNS records of type MX for zone abc123"
            expect_endpoint: "GET /zones/{zone_id}/dns_records"
            expect_params: ["zone_id", "type"]
          - task: "Create TXT record for _dmarc.example.com with value 'v=DMARC1; p=none'"
            expect_endpoint: "POST /zones/{zone_id}/dns_records"
            expect_params: ["zone_id", "type", "name", "content"]

      - spec: examples/sendgrid.yaml
        api: SendGrid
        tasks:
          - task: "Send email from sender@example.com to recipient@example.com with subject 'Hello' and body 'World'"
            expect_endpoint: "POST /v3/mail/send"
            expect_params: ["personalizations", "from", "subject", "content"]
          - task: "Send email with HTML content '<h1>Hello</h1>'"
            expect_endpoint: "POST /v3/mail/send"
            expect_params: ["personalizations", "from", "subject", "content"]
          - task: "Send email with attachment 'document.pdf'"
            expect_endpoint: "POST /v3/mail/send"
            expect_params: ["personalizations", "from", "subject", "content", "attachments"]
          - task: "Send email to multiple recipients with CC and BCC"
            expect_endpoint: "POST /v3/mail/send"
            expect_params: ["personalizations", "from", "subject", "content"]
          - task: "Send email with custom headers X-Custom-Header: value"
            expect_endpoint: "POST /v3/mail/send"
            expect_params: ["personalizations", "from", "subject", "content", "headers"]
          - task: "Get email statistics for last 7 days"
            expect_endpoint: "GET /v3/stats"
            expect_params: ["start_date"]
          - task: "Send email with template ID abc123"
            expect_endpoint: "POST /v3/mail/send"
            expect_params: ["personalizations", "from", "template_id"]
          - task: "Send email with send_at timestamp for scheduled delivery"
            expect_endpoint: "POST /v3/mail/send"
            expect_params: ["personalizations", "from", "subject", "content", "send_at"]
          - task: "List all sender identities"
            expect_endpoint: "GET /v3/senders"
            expect_params: []
          - task: "Send email with reply_to address support@example.com"
            expect_endpoint: "POST /v3/mail/send"
            expect_params: ["personalizations", "from", "subject", "content", "reply_to"]

      - spec: examples/snyk.yaml
        api: Snyk
        tasks:
          - task: "List all organizations"
            expect_endpoint: "GET /orgs"
            expect_params: []
          - task: "Get organization details for org ID abc123"
            expect_endpoint: "GET /orgs/{org_id}"
            expect_params: ["org_id"]
          - task: "List projects for organization abc123"
            expect_endpoint: "GET /orgs/{org_id}/projects"
            expect_params: ["org_id"]
          - task: "Get project details for project ID xyz789"
            expect_endpoint: "GET /orgs/{org_id}/projects/{project_id}"
            expect_params: ["org_id", "project_id"]
          - task: "Test npm package express@4.17.1 for vulnerabilities"
            expect_endpoint: "POST /test/npm"
            expect_params: ["packageName", "version"]
          - task: "Test Maven package org.springframework:spring-core:5.3.0"
            expect_endpoint: "POST /test/maven"
            expect_params: ["groupId", "artifactId", "version"]
          - task: "List issues for project xyz789 in org abc123"
            expect_endpoint: "GET /orgs/{org_id}/projects/{project_id}/issues"
            expect_params: ["org_id", "project_id"]
          - task: "Get issue details for issue ID issue123 in project xyz789"
            expect_endpoint: "GET /orgs/{org_id}/projects/{project_id}/issues/{issue_id}"
            expect_params: ["org_id", "project_id", "issue_id"]
          - task: "Monitor GitHub repo owner/repo for organization abc123"
            expect_endpoint: "POST /orgs/{org_id}/projects"
            expect_params: ["org_id"]
          - task: "List dependencies for project xyz789"
            expect_endpoint: "GET /orgs/{org_id}/projects/{project_id}/dependencies"
            expect_params: ["org_id", "project_id"]

  graphql:
    docs:
      - spec: examples/graphql/github.graphql
        api: GitHub GraphQL
        tasks:
          - task: "Query viewer's login name and email"
            expect_query: "viewer"
            expect_params: ["login", "email"]
          - task: "Query repository octocat/Hello-World with name and description"
            expect_query: "repository"
            expect_params: ["owner", "name", "description"]
          - task: "Query user octocat with bio and avatarUrl"
            expect_query: "user"
            expect_params: ["login", "bio", "avatarUrl"]
          - task: "Search repositories with query 'machine learning' and first 10 results"
            expect_query: "searchRepositories"
            expect_params: ["query", "first"]
          - task: "Create issue with title 'Bug report' in repository ID abc123 with body 'Description...'"
            expect_mutation: "createIssue"
            expect_params: ["repositoryId", "title", "body"]
          - task: "Update issue ID xyz789 with new title 'Updated Bug' and state CLOSED"
            expect_mutation: "updateIssue"
            expect_params: ["id", "title", "state"]
          - task: "Add star to repository ID repo_abc123"
            expect_mutation: "addStar"
            expect_params: ["repositoryId"]
          - task: "Remove star from repository ID repo_xyz789"
            expect_mutation: "removeStar"
            expect_params: ["repositoryId"]
          - task: "Subscribe to issueCreated events for repository ID repo_123"
            expect_subscription: "issueCreated"
            expect_params: ["repositoryId"]
          - task: "Subscribe to pullRequestUpdated events for repository ID repo_456"
            expect_subscription: "pullRequestUpdated"
            expect_params: ["repositoryId"]

      - spec: examples/graphql/stripe.graphql
        api: Stripe GraphQL
        tasks:
          - task: "Query customer by ID cus_abc123 with email and metadata"
            expect_query: "customer"
            expect_params: ["id"]
          - task: "Query first 10 customers with email filter customer@example.com"
            expect_query: "customers"
            expect_params: ["first", "email"]
          - task: "Query charge by ID ch_abc123 with amount and status"
            expect_query: "charge"
            expect_params: ["id"]
          - task: "Query first 20 charges for customer ID cus_xyz with after cursor"
            expect_query: "charges"
            expect_params: ["first", "customerId", "after"]
          - task: "Create customer with email new@example.com and name 'John Doe'"
            expect_mutation: "customerCreate"
            expect_params: ["email", "name"]
          - task: "Update customer cus_abc123 with new email updated@example.com"
            expect_mutation: "customerUpdate"
            expect_params: ["id", "email"]
          - task: "Create charge for customer cus_abc123 with amount 5000 in USD using payment method pm_123"
            expect_mutation: "chargeCreate"
            expect_params: ["amount", "currency", "customerId", "paymentMethodId"]
          - task: "Create refund for charge ch_abc123 with amount 1000 and reason 'duplicate'"
            expect_mutation: "refundCreate"
            expect_params: ["chargeId", "amount", "reason"]
          - task: "Query invoice by ID inv_123 with status and total"
            expect_query: "invoice"
            expect_params: ["id"]
          - task: "Finalize invoice inv_456 to make it payable"
            expect_mutation: "invoiceFinalize"
            expect_params: ["id"]

      - spec: examples/graphql/shopify.graphql
        api: Shopify GraphQL
        tasks:
          - task: "Query shop name and email"
            expect_query: "shop"
            expect_params: ["name", "email"]
          - task: "Query first 10 products with title and variants"
            expect_query: "products"
            expect_params: ["first", "title", "variants"]
          - task: "Query product by ID gid://shopify/Product/123 with price"
            expect_query: "product"
            expect_params: ["id", "priceRange"]
          - task: "Create product with title 'New Product' and variants"
            expect_mutation: "productCreate"
            expect_params: ["title", "variants"]
          - task: "Update product gid://shopify/Product/123 with description"
            expect_mutation: "productUpdate"
            expect_params: ["id", "descriptionHtml"]
          - task: "Query first 20 orders with order number and total"
            expect_query: "orders"
            expect_params: ["first", "name", "totalPrice"]
          - task: "Query order by ID gid://shopify/Order/456 with line items"
            expect_query: "order"
            expect_params: ["id", "lineItems"]
          - task: "Create draft order with line items"
            expect_mutation: "draftOrderCreate"
            expect_params: ["lineItems"]
          - task: "Query customer by ID gid://shopify/Customer/789 with orders"
            expect_query: "customer"
            expect_params: ["id", "orders"]
          - task: "Query first 10 collections with title"
            expect_query: "collections"
            expect_params: ["first", "title"]

      - spec: examples/graphql/slack.graphql
        api: Slack GraphQL
        tasks:
          - task: "Query workspace name and domain"
            expect_query: "workspace"
            expect_params: ["name", "domain"]
          - task: "Query user by ID U123ABC with name and email"
            expect_query: "user"
            expect_params: ["id", "name", "email"]
          - task: "Query first 20 channels with name and topic"
            expect_query: "channels"
            expect_params: ["first", "name", "topic"]
          - task: "Query messages from channel C123ABC with limit 50"
            expect_query: "channel"
            expect_params: ["id", "messages", "first"]
          - task: "Send message 'Hello' to channel C123ABC"
            expect_mutation: "postMessage"
            expect_params: ["channelId", "text"]
          - task: "Update message with timestamp 1234567890.123456 in channel C123ABC"
            expect_mutation: "updateMessage"
            expect_params: ["channelId", "ts", "text"]
          - task: "Delete message with timestamp 1234567890.123456 from channel C123ABC"
            expect_mutation: "deleteMessage"
            expect_params: ["channelId", "ts"]
          - task: "Add reaction emoji to message"
            expect_mutation: "addReaction"
            expect_params: ["channelId", "timestamp", "name"]
          - task: "Query channel members for channel C123ABC"
            expect_query: "channel"
            expect_params: ["id", "members"]
          - task: "Create channel with name 'new-channel'"
            expect_mutation: "createChannel"
            expect_params: ["name"]

      - spec: examples/graphql/twitter.graphql
        api: Twitter GraphQL
        tasks:
          - task: "Query user by username elonmusk with followers count"
            expect_query: "user"
            expect_params: ["username", "followersCount"]
          - task: "Query tweet by ID 1234567890 with text and likes"
            expect_query: "tweet"
            expect_params: ["id", "text", "likeCount"]
          - task: "Query first 20 tweets from user timeline"
            expect_query: "user"
            expect_params: ["tweets", "first"]
          - task: "Create tweet with text 'Hello Twitter!'"
            expect_mutation: "createTweet"
            expect_params: ["text"]
          - task: "Reply to tweet 1234567890 with text 'Great point!'"
            expect_mutation: "createTweet"
            expect_params: ["text", "replyToTweetId"]
