# Agent Validation Test Tasks
# Each task targets a specific API spec and describes a real-world integration task.

tasks:
  # Stripe
  - spec: examples/stripe-charges.yaml
    api: Stripe
    task: "Create a charge for $10.00 USD using a test token tok_visa"
    expect_endpoint: "POST /v1/charges"
    expect_params: ["amount", "currency", "source"]

  - spec: examples/stripe-charges.yaml
    api: Stripe
    task: "Retrieve the details of charge ch_1234567890"
    expect_endpoint: "GET /v1/charges/{id}"
    expect_params: ["id"]

  - spec: examples/stripe-charges.yaml
    api: Stripe
    task: "List all charges with a limit of 5"
    expect_endpoint: "GET /v1/charges"
    expect_params: ["limit"]

  # GitHub
  - spec: examples/github-core.yaml
    api: GitHub
    task: "List issues for the repository octocat/Hello-World"
    expect_endpoint: "GET /repos/{owner}/{repo}/issues"
    expect_params: ["owner", "repo"]

  - spec: examples/github-core.yaml
    api: GitHub
    task: "Create a new issue titled 'Bug report' in repo octocat/Hello-World"
    expect_endpoint: "POST /repos/{owner}/{repo}/issues"
    expect_params: ["owner", "repo", "title"]

  - spec: examples/github-core.yaml
    api: GitHub
    task: "Get the repository details for octocat/Hello-World"
    expect_endpoint: "GET /repos/{owner}/{repo}"
    expect_params: ["owner", "repo"]

  # OpenAI
  - spec: examples/openai-core.yaml
    api: OpenAI
    task: "Create a chat completion using gpt-4 with the message 'Hello, world!'"
    expect_endpoint: "POST /v1/chat/completions"
    expect_params: ["model", "messages"]

  - spec: examples/openai-core.yaml
    api: OpenAI
    task: "List all available models"
    expect_endpoint: "GET /v1/models"
    expect_params: []

  - spec: examples/openai-core.yaml
    api: OpenAI
    task: "Create an embedding for the text 'Hello world' using text-embedding-ada-002"
    expect_endpoint: "POST /v1/embeddings"
    expect_params: ["model", "input"]

  # Twilio
  - spec: examples/twilio-core.yaml
    api: Twilio
    task: "Send an SMS from +15551234567 to +15559876543 with body 'Hello from Twilio'"
    expect_endpoint: "POST /2010-04-01/Accounts/{AccountSid}/Messages.json"
    expect_params: ["To", "From", "Body"]

  - spec: examples/twilio-core.yaml
    api: Twilio
    task: "List all messages for your account"
    expect_endpoint: "GET /2010-04-01/Accounts/{AccountSid}/Messages.json"
    expect_params: []

  - spec: examples/twilio-core.yaml
    api: Twilio
    task: "Make a voice call from +15551234567 to +15559876543 with TwiML URL http://example.com/twiml"
    expect_endpoint: "POST /2010-04-01/Accounts/{AccountSid}/Calls.json"
    expect_params: ["To", "From", "Url"]
