syntax = "proto3";

package envoy.service.auth.v3;

// Envoy External Authorization Service
// Based on the Envoy proxy ext_authz filter API.
service Authorization {
  // Performs authorization check based on the attributes associated with the
  // incoming request, and returns status OK or not OK.
  rpc Check(CheckRequest) returns (CheckResponse);
}

// An attribute is a piece of metadata that describes an activity on a network.
message AttributeContext {
  // Represents a network peer.
  message Peer {
    string address = 1;
    uint32 port = 2;
    string principal = 3;
    string certificate = 4;
    map<string, string> labels = 5;
  }

  // Represents an HTTP request.
  message HttpRequest {
    string id = 1;
    string method = 2;
    map<string, string> headers = 3;
    string path = 4;
    string host = 5;
    string scheme = 6;
    string query = 7;
    string fragment = 8;
    uint64 size = 9;
    string protocol = 10;
    string body = 11;
    map<string, string> raw_body = 12;
  }

  Peer source = 1;
  Peer destination = 2;
  HttpRequest request = 3;
  map<string, string> context_extensions = 4;
  map<string, string> metadata_context = 5;
}

message CheckRequest {
  AttributeContext attributes = 1;
}

// HTTP status codes used in authorization responses.
message HttpStatus {
  enum StatusCode {
    EMPTY = 0;
    OK = 200;
    BAD_REQUEST = 400;
    UNAUTHORIZED = 401;
    FORBIDDEN = 403;
    NOT_FOUND = 404;
    INTERNAL_SERVER_ERROR = 500;
  }
  StatusCode code = 1;
}

message HeaderValueOption {
  string header_name = 1;
  string header_value = 2;
  bool append = 3;
}

message OkHttpResponse {
  repeated HeaderValueOption headers = 1;
  repeated string headers_to_remove = 2;
  map<string, string> dynamic_metadata = 3;
  string response_headers_to_add = 4;
  repeated HeaderValueOption query_parameters_to_set = 5;
}

message DeniedHttpResponse {
  HttpStatus status = 1;
  repeated HeaderValueOption headers = 2;
  string body = 3;
}

message CheckResponse {
  // Status code.
  enum StatusCode {
    OK = 0;
    DENIED = 1;
    ERROR = 2;
  }

  StatusCode status = 1;
  oneof http_response {
    DeniedHttpResponse denied_response = 2;
    OkHttpResponse ok_response = 3;
  }
  map<string, string> dynamic_metadata = 4;
}
