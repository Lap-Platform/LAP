enum Currency { USD EUR GBP CAD AUD JPY CHF }
enum ChargeStatus { SUCCEEDED PENDING FAILED }
enum SubscriptionStatus { ACTIVE PAST_DUE UNPAID CANCELED INCOMPLETE INCOMPLETE_EXPIRED TRIALING PAUSED }
enum InvoiceStatus { DRAFT OPEN PAID UNCOLLECTIBLE VOID }
enum PaymentMethodType { CARD BANK_TRANSFER SEPA_DEBIT }
enum RefundReason { DUPLICATE FRAUDULENT REQUESTED_BY_CUSTOMER }
enum Interval { DAY WEEK MONTH YEAR }

interface Node { id: ID! }
type PageInfo { hasNextPage: Boolean! hasPreviousPage: Boolean! startCursor: String endCursor: String }

type Customer implements Node {
  id: ID!
  email: String
  name: String
  phone: String
  description: String
  defaultPaymentMethod: PaymentMethod
  subscriptions(first: Int, after: String): SubscriptionConnection!
  charges(first: Int, after: String): ChargeConnection!
  invoices(first: Int, after: String): InvoiceConnection!
  balance: Int!
  currency: Currency
  metadata: JSON
  created: Int!
  livemode: Boolean!
}

type Charge implements Node {
  id: ID!
  amount: Int!
  currency: Currency!
  status: ChargeStatus!
  customer: Customer
  paymentMethod: PaymentMethod
  description: String
  receiptEmail: String
  receiptUrl: String
  refunded: Boolean!
  refunds(first: Int): RefundConnection!
  invoice: Invoice
  metadata: JSON
  created: Int!
}

type PaymentMethod implements Node {
  id: ID!
  type: PaymentMethodType!
  card: CardDetails
  customer: Customer
  billingDetails: BillingDetails
  created: Int!
}

type CardDetails { brand: String! last4: String! expMonth: Int! expYear: Int! funding: String country: String }
type BillingDetails { name: String email: String phone: String address: Address }
type Address { line1: String line2: String city: String state: String postalCode: String country: String }

type Subscription implements Node {
  id: ID!
  status: SubscriptionStatus!
  customer: Customer!
  items(first: Int): SubscriptionItemConnection!
  currentPeriodStart: Int!
  currentPeriodEnd: Int!
  cancelAtPeriodEnd: Boolean!
  canceledAt: Int
  trialStart: Int
  trialEnd: Int
  defaultPaymentMethod: PaymentMethod
  latestInvoice: Invoice
  metadata: JSON
  created: Int!
}

type SubscriptionItem implements Node { id: ID! price: Price! quantity: Int! }

type Price implements Node {
  id: ID!
  active: Boolean!
  currency: Currency!
  unitAmount: Int
  recurring: Recurring
  product: Product!
  nickname: String
  type: String!
}

type Recurring { interval: Interval! intervalCount: Int! trialPeriodDays: Int usageType: String }

type Product implements Node {
  id: ID!
  name: String!
  description: String
  active: Boolean!
  images: [String!]!
  metadata: JSON
  prices(first: Int): PriceConnection!
  created: Int!
}

type Invoice implements Node {
  id: ID!
  number: String
  status: InvoiceStatus!
  customer: Customer!
  subscription: Subscription
  amountDue: Int!
  amountPaid: Int!
  amountRemaining: Int!
  currency: Currency!
  lines(first: Int): InvoiceLineItemConnection!
  hostedInvoiceUrl: String
  invoicePdf: String
  dueDate: Int
  created: Int!
}

type InvoiceLineItem { id: ID! amount: Int! currency: Currency! description: String price: Price quantity: Int }
type Refund implements Node { id: ID! amount: Int! currency: Currency! reason: RefundReason status: String! charge: Charge! created: Int! }

scalar JSON

type CustomerConnection { edges: [CustomerEdge!]! pageInfo: PageInfo! }
type CustomerEdge { cursor: String! node: Customer! }
type ChargeConnection { edges: [ChargeEdge!]! pageInfo: PageInfo! }
type ChargeEdge { cursor: String! node: Charge! }
type SubscriptionConnection { edges: [SubscriptionEdge!]! pageInfo: PageInfo! }
type SubscriptionEdge { cursor: String! node: Subscription! }
type SubscriptionItemConnection { edges: [SubscriptionItemEdge!]! pageInfo: PageInfo! }
type SubscriptionItemEdge { cursor: String! node: SubscriptionItem! }
type InvoiceConnection { edges: [InvoiceEdge!]! pageInfo: PageInfo! }
type InvoiceEdge { cursor: String! node: Invoice! }
type InvoiceLineItemConnection { edges: [InvoiceLineItemEdge!]! pageInfo: PageInfo! }
type InvoiceLineItemEdge { cursor: String! node: InvoiceLineItem! }
type PriceConnection { edges: [PriceEdge!]! pageInfo: PageInfo! }
type PriceEdge { cursor: String! node: Price! }
type RefundConnection { edges: [RefundEdge!]! pageInfo: PageInfo! }
type RefundEdge { cursor: String! node: Refund! }
type ProductConnection { edges: [ProductEdge!]! pageInfo: PageInfo! }
type ProductEdge { cursor: String! node: Product! }

input CustomerCreateInput { email: String name: String phone: String description: String metadata: JSON }
input ChargeCreateInput { amount: Int! currency: Currency! customerId: ID description: String paymentMethodId: ID }
input SubscriptionCreateInput { customerId: ID! items: [SubscriptionItemInput!]! trialPeriodDays: Int cancelAtPeriodEnd: Boolean }
input SubscriptionItemInput { priceId: ID! quantity: Int }
input RefundCreateInput { chargeId: ID! amount: Int reason: RefundReason }

type CustomerPayload { customer: Customer }
type ChargePayload { charge: Charge }
type SubscriptionPayload { subscription: Subscription }
type RefundPayload { refund: Refund }
type InvoicePayload { invoice: Invoice }

type Query {
  customer(id: ID!): Customer
  customers(first: Int, after: String, email: String): CustomerConnection!
  charge(id: ID!): Charge
  charges(first: Int, after: String, customerId: ID): ChargeConnection!
  subscription(id: ID!): Subscription
  subscriptions(first: Int, after: String, customerId: ID, status: SubscriptionStatus): SubscriptionConnection!
  invoice(id: ID!): Invoice
  invoices(first: Int, after: String, customerId: ID, status: InvoiceStatus): InvoiceConnection!
  product(id: ID!): Product
  products(first: Int, after: String, active: Boolean): ProductConnection!
  node(id: ID!): Node
}

type Mutation {
  customerCreate(input: CustomerCreateInput!): CustomerPayload!
  customerUpdate(id: ID!, input: CustomerCreateInput!): CustomerPayload!
  chargeCreate(input: ChargeCreateInput!): ChargePayload!
  subscriptionCreate(input: SubscriptionCreateInput!): SubscriptionPayload!
  subscriptionCancel(id: ID!, atPeriodEnd: Boolean): SubscriptionPayload!
  refundCreate(input: RefundCreateInput!): RefundPayload!
  invoiceFinalize(id: ID!): InvoicePayload!
  invoiceVoid(id: ID!): InvoicePayload!
}
